<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ITB-Ganesha 360 degree VR view</title>
    <meta name="description" content="Custom Stellarium Resources by Raihan Mohammad">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      
AFRAME.registerComponent('zoom-controls', {
  schema: {
    min: {type: 'number', default: 20},
    max: {type: 'number', default: 80}
  },
  init: function () {
    var self = this;
    this.initialDist = 0; // Untuk simpan jarak awal cubitan

    // KONTROL MOUSE (DESKTOP)
    window.addEventListener('wheel', function (event) {
      var cam = self.el.getAttribute('camera');
      var fov = cam.fov + event.deltaY * 0.05;
      fov = Math.min(Math.max(fov, self.data.min), self.data.max);
      self.el.setAttribute('camera', 'fov', fov);
    });

    // KONTROL SENTUH / PINCH (MOBILE NON-GYRO)
    window.addEventListener('touchstart', function (event) {
      if (event.touches.length === 2) {
        // Hitung jarak awal antara dua jari
        self.initialDist = Math.hypot(
          event.touches[0].pageX - event.touches[1].pageX,
          event.touches[0].pageY - event.touches[1].pageY
        );
      }
    }, false);

    window.addEventListener('touchmove', function (event) {
      if (event.touches.length === 2) {
        var cam = self.el.getAttribute('camera');
        var fov = cam.fov;

        // Hitung jarak baru saat jari bergerak
        var currentDist = Math.hypot(
          event.touches[0].pageX - event.touches[1].pageX,
          event.touches[0].pageY - event.touches[1].pageY
        );

        // Jika jarak membesar = zoom in (fov kecil), jarak mengecil = zoom out (fov besar)
        var diff = self.initialDist - currentDist;
        fov += diff * 0.1; // Sensitivitas pinch

        fov = Math.min(Math.max(fov, self.data.min), self.data.max);
        self.el.setAttribute('camera', 'fov', fov);

        // Update jarak awal untuk frame berikutnya
        self.initialDist = currentDist;
      }
    }, false);
  }
});
    </script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black">
      
      <a-assets>
        <img id="sky-ITB" src="itb_equirectangular.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#sky-ITB" 
             rotation="0 180 0" 
             animation="property: rotation; to: 0 540 0; loop: true; dur: 200000; easing: linear">
      </a-sky>

      <a-entity camera="fov: 60" look-controls zoom-on-wheel="min: 20; max: 120"></a-entity>
        
</a-entity>

    </a-scene>

  </body>
</html>
